name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: build artifacts
        shell: pwsh
        run: ./build/pack.ps1

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
